                <span class="title_xxlarge">담아내다</span>

                    지역의 이름에는 수백 년의 시간과 수많은 사람들의 기억이 담겨 있습니다. <br>
                    도시브랜드연구소는 그 보이지 않는 이야기를 꺼내어 <br>
                    눈에 보이는 형태로 빚어냅니다.
                </span><!-- article_xlarge -->
            </p><!-- solution_lower -->
